name: Daily Blog Post Generator
on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
jobs:
  generate-post:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - run: pip install zai-sdk requests
      - name: Run blog generator
        env:
          ZHIPU_API_KEY: ${{ secrets.ZHIPU_API_KEY }}
        run: python scripts/generate_blog.py
      - name: Generate sitemap
        run: python scripts/generate_sitemap.py
      - name: Commit changes
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add content/blog/ sitemap.xml
          git diff --staged --quiet || git commit -m "📝 Add daily blog post [skip ci]"
          git push

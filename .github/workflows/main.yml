name: Daily Blog Post Generator

on:
  schedule:
    - cron: '0 6 * * *'   # Runs daily at 06:00 UTC
  workflow_dispatch:       # Manual trigger

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # Opt into Node24 early

jobs:
  generate-post:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run blog generator
        run: python scripts/generate_blog.py

      - name: Commit and push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add blog/
          git diff --quiet && git diff --staged --quiet || git commit -m "Add daily blog post [skip ci]"
          git push

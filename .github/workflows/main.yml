name: Daily Blog Post Generator

on:
  schedule:
    - cron: '0 6 * * *'      # 6:00 AM UTC daily
  workflow_dispatch:           # manual trigger

jobs:
  generate-post:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install zai-sdk requests

      - name: Run blog generator
        env:
          ZHIPU_API_KEY: ${{ secrets.ZHIPU_API_KEY }}
        run: python scripts/generate_blog.py

      - name: Commit and push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add blog/ blog_generator.log
          git diff --quiet && git diff --staged --quiet || git commit -m "📝 Add daily blog post for $(date +'%Y-%m-%d') [skip ci]"
          git push
